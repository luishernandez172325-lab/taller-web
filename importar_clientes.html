window.iniciarImportacion=async function(){
  const btn=document.getElementById('btn-import');
  btn.disabled=true;
  addLog('Iniciando importación de 6684 clientes...',true);
  let ok=0;
  try{
    for(let i=0;i<chunks.length;i++){
      const batch={};
      Object.entries(chunks[i]).forEach(([k,v])=>{batch['clientes/'+k]=v;});
      await update(ref(db,'/'),batch);
      ok+=Object.keys(chunks[i]).length;
      const pct=Math.round(((i+1)/chunks.length)*100);
      document.getElementById('prog').style.width=pct+'%';
      document.getElementById('status').textContent='Lote '+(i+1)+' de 34  — '+ok+' clientes ('+pct+'%)';
      addLog('Lote '+(i+1)+'/34 completado — '+ok+' acumulados',true);
    }
    await update(ref(db,'/'),{'_config/clientesImportados':true,'_config/totalClientes':6684,'_config/fechaImportacion':new Date().toISOString()});
    document.getElementById('prog').style.width='100%';
    document.getElementById('status').textContent='Importacion completa: '+ok+' clientes';
    addLog('LISTO. '+ok+' clientes en Firebase. Puede cerrar esta pagina.',true);
    btn.textContent='Importacion completada';
  }catch(e){
    addLog('ERROR: '+e.message,false);
    document.getElementById('status').textContent='Error — revise el log';
    btn.disabled=false;
  }
};

window.verificarImportacion=async function(){
  addLog('Verificando Firebase...');
  try{
    const s=await get(ref(db,'_config'));
    const cfg=s.val()||{};
    if(cfg.clientesImportados){
      addLog('Clientes importados: '+cfg.totalClientes+' registros',true);
    }else{
      addLog('Clientes NO importados aun',false);
    }
    const sc=await get(ref(db,'clientes'));
    const n=sc.val()?Object.keys(sc.val()).length:0;
    addLog('Registros en Firebase/clientes: '+n,n>0);
  }catch(e){addLog('Error: '+e.message,false);}
};
</script>
